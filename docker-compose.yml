version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: textilepos-postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-textilepos}
      POSTGRES_USER: ${DB_USER:-textilepos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-textilepos_dev_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-textilepos}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: textilepos-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API (development: watch + migrate on start)
  api:
    build:
      context: .
      dockerfile: infra/docker/api.dev.Dockerfile
    container_name: textilepos-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-textilepos}:${DB_PASSWORD:-textilepos_dev_pass}@postgres:5432/${DB_NAME:-textilepos}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_min_32_chars_long_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_min_32_ch}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma

  # Next.js (development)
  web:
    build:
      context: .
      dockerfile: infra/docker/web.dev.Dockerfile
    container_name: textilepos-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public

  # NGINX (optional — uses host port 80; enable with: docker compose --profile nginx up)
  nginx:
    profiles:
      - nginx
    image: nginx:alpine
    container_name: textilepos-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
